<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Cykelværkstedet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .topbar {
            background: #2a7ae2;
            color: white;
            padding: 15px;
            font-size: 20px;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        a.button {
            display: inline-block;
            padding: 10px 15px;
            background: rgba(42,122,226);
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 10px;
        }
        a.button:hover {
            background: rgb(31, 95, 184);
        }

        .recent-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .bike-card {
            width: 160px;
            background: white;
            border: 2px solid #333;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }

        .image-placeholder {
            width: 100%;
            height: 120px;
            border: 2px solid #333;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .image-placeholder::before,
        .image-placeholder::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 2px;
            background: #333;x

            transform-origin: center;
        }

        /* diagonal 1 */
        .image-placeholder::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* diagonal 2 */
        .image-placeholder::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }
    </style>
</head>
<body>

<div class="topbar">
    Cykelværkstedet - Dashboard
</div>

<div class="container">
    <div class="card">
        <h2>Velkommen Admin!</h2>
        <p>Sidst åbnet:</p>

    </div>

    <div class="card">
        <h2>Seneste reservationer</h2>
        <div class="recent-grid">
            <div class="bike-card">
                <div class="image-placeholder"></div>
                <p>Cykel id 1</p>
            </div>
            <div class="bike-card">
                <div class="image-placeholder"></div>
                <p>Cykel id 2</p>
            </div>
            <div class="bike-card">
                <div class="image-placeholder"></div>
                <p>Cykel id 3</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Funktioner</h2>
        <a class="button" href="/bikes/new">Ny reservation</a>
        <a class="button" href="/bikes/search">Søg reservation</a>
        <a class="button" href="/bikes">Se reservationer</a>
        <a class="button" href="/tasks">Se opgaver</a>
        <a class="button" href="/inventory">Se lager</a>    
    </div>



    <div class="card">
        <a class="button" href="/logout">Log ud</a>
    </div>
</div>
</body>
</html>

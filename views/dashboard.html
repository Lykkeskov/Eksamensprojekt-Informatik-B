<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Cykelværkstedet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .topbar {
            background: #2a7ae2;
            color: white;
            padding: 15px;
            font-size: 20px;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        a.button {
            display: inline-block;
            padding: 10px 15px;
            background: #2a7ae2;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="topbar">
    Cykelværkstedet – Dashboard
</div>

<div class="container">

    <div class="card">
        <h2>Velkommen!</h2>
        <p>Du er logget ind som: <strong>Admin</strong></p>
        <a class="button" href="/logout">Log ud</a>
    </div>

    <div class="card">
<h2>Hurtige handlinger</h2>
<a class="button" href="/bikes/new">Ny reservation</a>
<a class="button" href="/bikes/search">Søg reservation</a>
<a class="button" href="/tasks">Se opgaver</a>
<a class="button" href="/inventory">Se lager</a>
    </div>

</div>

</body>
</html>
